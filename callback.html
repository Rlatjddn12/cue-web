<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>cue. — 인증 중...</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      background: #111010;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Georgia, serif;
      color: #F7F5F0;
    }
    .logo { font-size: 36px; margin-bottom: 24px; }
    .msg { font-size: 14px; color: #888; font-family: sans-serif; }
  </style>
</head>
<body>
  <div class="logo">cue.</div>
  <div class="msg">인증 중입니다...</div>
  <script>
    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const access_token = params.get('access_token');
    const refresh_token = params.get('refresh_token');

    if (access_token) {
      // Redirect to app with tokens
      const appUrl = 'cue://auth/callback#' + hash;
      window.location.href = appUrl;

      // Fallback message after 2 seconds
      setTimeout(() => {
        document.querySelector('.msg').textContent =
          '앱이 열리지 않으면 cue. 앱을 직접 열어주세요.';
      }, 2000);
    } else {
      document.querySelector('.msg').textContent = '인증 정보가 없습니다. 다시 시도해주세요.';
    }
  </script>
</body>
</html>
