<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cue.</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111010;
      color: #F7F5F0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 400px;
    }
    .logo {
      font-size: 32px;
      font-weight: 400;
      letter-spacing: -1px;
      margin-bottom: 32px;
      font-family: Georgia, serif;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      font-size: 14px;
      color: #888;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      background: #F7F5F0;
      color: #111010;
      padding: 14px 32px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 12px;
    }
    .btn-secondary {
      display: block;
      color: #888;
      font-size: 13px;
      text-decoration: none;
      margin-top: 8px;
    }
    .error { color: #FF4444; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">cue.</div>
    <div id="content"></div>
  </div>

  <script>
    const lang = navigator.language.startsWith('ko') ? 'ko' : 'en';
    document.documentElement.lang = lang;

    const copy = {
      processing:   { ko: '처리 중...',   en: 'Processing...' },
      verified:     { ko: '인증 완료',     en: 'Verified' },
      verifiedDesc: { ko: '이메일 인증이 완료되었습니다.\n앱으로 돌아가서 cue.를 즐겨보세요.', en: 'Your email has been verified.\nReturn to the app and enjoy cue.' },
      openApp:      { ko: '앱으로 돌아가기', en: 'Open cue.' },
      noApp:        { ko: '앱이 없으신가요? 다운로드', en: "Don't have the app? Download" },
      confirmed:    { ko: '확인 완료',     en: 'Confirmed' },
      confirmedDesc:{ ko: '앱으로 돌아가서 계속하세요.', en: 'Return to the app to continue.' },
      error:        { ko: '오류 발생',     en: 'Something went wrong' },
      home:         { ko: '홈으로',        en: 'Go home' },
    };

    function t(key) { return copy[key][lang]; }

    const content = document.getElementById('content');
    content.innerHTML = `<p style="color:#888">${t('processing')}</p>`;

    const hash = window.location.hash.substring(1);
    const params = new URLSearchParams(hash);
    const query = new URLSearchParams(window.location.search);

    const type = params.get('type') || query.get('type');
    const accessToken = params.get('access_token');
    const error = params.get('error_description') || query.get('error_description');

    const checkIcon = `
      <svg class="icon" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="32" cy="32" r="30" stroke="#F7F5F0" stroke-width="2"/>
        <path d="M20 32l9 9 15-15" stroke="#F7F5F0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>`;

    if (error) {
      content.innerHTML = `
        <h1 class="error">${t('error')}</h1>
        <p>${error}</p>
        <a href="/" class="btn-secondary">${t('home')}</a>
      `;
    } else if (accessToken || type === 'recovery') {
      const deepLink = 'cue://' + window.location.pathname + window.location.search + window.location.hash;
      const desc = t('verifiedDesc').replace('\n', '<br>');
      content.innerHTML = `
        ${checkIcon}
        <h1>${t('verified')}</h1>
        <p>${desc}</p>
        <a href="${deepLink}" class="btn">${t('openApp')}</a>
        <a href="https://play.google.com/store/apps/details?id=com.cueapp.music" class="btn-secondary">
          ${t('noApp')}
        </a>
      `;
      setTimeout(() => { window.location.href = deepLink; }, 2000);
    } else {
      const deepLink = 'cue://';
      content.innerHTML = `
        ${checkIcon}
        <h1>${t('confirmed')}</h1>
        <p>${t('confirmedDesc')}</p>
        <a href="${deepLink}" class="btn">${t('openApp')}</a>
        <a href="https://play.google.com/store/apps/details?id=com.cueapp.music" class="btn-secondary">
          ${t('noApp')}
        </a>
      `;
    }
  </script>
</body>
</html>
