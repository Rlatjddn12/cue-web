<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cue. — 인증 중...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111010;
      color: #F7F5F0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      text-align: center;
    }
    .logo { font-size: 48px; font-weight: 400; letter-spacing: -2px; margin-bottom: 24px; }
    .status { font-size: 16px; color: #888; font-family: sans-serif; line-height: 1.6; }
    .hint { font-size: 13px; color: #555; font-family: sans-serif; margin-top: 32px; line-height: 1.6; }
    .open-btn {
      margin-top: 32px;
      display: none;
      background: #F7F5F0; color: #111010;
      padding: 14px 28px; border-radius: 12px;
      font-family: sans-serif; font-size: 14px; font-weight: 600;
      text-decoration: none; cursor: pointer; border: none;
    }
  </style>
</head>
<body>
  <div class="logo">cue.</div>
  <div class="status" id="status">이메일 인증 중...</div>
  <button class="open-btn" id="openBtn" onclick="redirect()">앱에서 열기</button>
  <div class="hint" id="hint"></div>

  <script>
    var deepLink = null;

    function redirect() {
      if (deepLink) window.location.href = deepLink;
    }

    function getParams() {
      // Supabase puts tokens in the hash fragment
      var hash = window.location.hash;
      if (hash && hash.includes('access_token')) return hash.substring(1);
      // Fallback: query string
      var search = window.location.search;
      if (search && search.includes('access_token')) return search.substring(1);
      return null;
    }

    var params = getParams();

    if (params) {
      deepLink = 'cue://auth/callback?' + params;

      // Attempt automatic redirect
      window.location.href = deepLink;

      // After a short delay, show manual button in case the OS didn't open the app
      setTimeout(function () {
        document.getElementById('status').textContent = '앱이 자동으로 열리지 않으면 아래 버튼을 눌러주세요.';
        document.getElementById('openBtn').style.display = 'inline-block';
        document.getElementById('hint').textContent =
          '앱이 설치되어 있지 않다면 App Store에서 cue.를 다운로드하세요.';
      }, 1500);
    } else {
      document.getElementById('status').textContent = '유효하지 않은 인증 링크입니다.';
      document.getElementById('hint').innerHTML =
        '<a href="./index.html" style="color:#888;">← cue. 홈으로</a>';
    }
  </script>
</body>
</html>
