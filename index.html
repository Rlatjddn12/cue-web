<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cue. — 음악 취향 아카이브</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111010;
      color: #F7F5F0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .logo { font-size: 64px; font-weight: 400; letter-spacing: -2px; margin-bottom: 16px; }
    .tagline { font-size: 18px; color: #888; margin-bottom: 48px; font-style: italic; }
    .desc { font-size: 15px; color: #666; text-align: center; max-width: 400px; line-height: 1.7; margin-bottom: 48px; }
    .badge {
      background: #F7F5F0; color: #111010;
      padding: 14px 28px; border-radius: 12px;
      font-family: sans-serif; font-size: 14px; font-weight: 600;
      text-decoration: none; display: inline-block;
    }
    .privacy-link { margin-top: 40px; font-size: 12px; color: #444; text-decoration: none; font-family: sans-serif; }
    .privacy-link:hover { color: #888; }
  </style>
  <script>
    // If Supabase redirected here with auth tokens, forward them into the app
    var hash = window.location.hash;
    if (hash && hash.includes('access_token')) {
      var params = hash.substring(1); // strip leading #
      window.location.href = 'cue://auth/callback?' + params;
    }
  </script>
</head>
<body>
  <div class="logo">cue.</div>
  <div class="tagline">Your music. Your moments. Curated.</div>
  <div class="desc">음악으로 연결되는 소셜 아카이브. 지금 듣고 있는 곡을 공유하고, 취향이 맞는 사람들을 발견하세요.</div>
  <a class="badge" href="#">App Store에서 다운로드</a>
  <a class="privacy-link" href="./privacy.html">개인정보 처리방침</a>
  <a class="privacy-link" href="./terms.html">이용약관</a>
  <footer style="text-align:center; padding:24px; color:#888; font-size:12px;">
    © 2026 cue. All rights reserved.
  </footer>
</body>
</html>
